name: wcap

on:
  push:
    branches: main
    paths-ignore:
      - '**/README.md'
  pull_request:
    branches: main
    paths-ignore:
      - '**/README.md'

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Build (x64)
        shell: cmd
        run: cd repo && build.cmd x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wcap-x64
          path: repo\wcap-x64.exe
